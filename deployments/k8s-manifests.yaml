# ==========================================
# GLOBAL-ROUTER: Load Balancer & Proxy
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-global
  namespace: global-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router-global
  template:
    metadata:
      labels:
        app: router-global
    spec:
      containers:
      - name: router
        image: apex-cdn-router:latest # local built image
        imagePullPolicy: Never
        env:
        - name: PORT
          value: "8080"
        - name: US_EAST_URL
          value: http://app-us-east.us-east.svc.cluster.local:8081
        - name: US_WEST_URL
          value: http://app-us-west.us-west.svc.cluster.local:8081
        - name: EU_WEST_URL
          value: http://app-eu-west.eu-west.svc.cluster.local:8081
        - name: WEB_DIR
          value: ./web
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: router-global
  namespace: global-router
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
  selector:
    app: router-global
